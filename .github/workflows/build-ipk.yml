name: Build ImmortalWrt IPK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'config/**'
      - 'openwrt/**'
      - 'scripts/build-immortalwrt-24.10.5-ramips-mt7621.sh'
      - '.github/workflows/build-ipk.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'config/**'
      - 'openwrt/**'
      - 'scripts/build-immortalwrt-24.10.5-ramips-mt7621.sh'
      - '.github/workflows/build-ipk.yml'

jobs:
  build-ipk:
    name: ImmortalWrt 24.10.5 ramips/mt7621 mipsel_24kc
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SDK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-distutils \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            zstd

      - name: Cache ImmortalWrt SDK
        uses: actions/cache@v4
        with:
          path: ~/immortalwrt-lgtvctl-build
          key: immortalwrt-24.10.5-ramips-mt7621-v3

      - name: Build lgtvctl IPK
        run: |
          bash scripts/build-immortalwrt-24.10.5-ramips-mt7621.sh

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find ~/immortalwrt-lgtvctl-build -type f -name 'lgtvctl_*.ipk' -exec cp -v {} artifacts/ \;
          find ~/immortalwrt-lgtvctl-build -type f -name 'Packages*' -path '*/bin/packages/mipsel_24kc/*' -exec cp -v {} artifacts/ \; || true
          ls -la artifacts

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lgtvctl-immortalwrt-24.10.5-ramips-mt7621-mipsel_24kc
          path: artifacts/*
          if-no-files-found: error
